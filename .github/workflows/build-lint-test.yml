name: Build lint and test

on:
  - push
  - pull_request

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check format
        run: |
          find . -path ./build -prune -o -type f \( -name '*.cpp' -o -name '*.hpp' \) -print | xargs clang-format-18 --style=file --dry-run -Werror

      - name: Configure
        run: cmake . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Lint
        run: |
          find src app tests -name '*.cpp' -print0 | xargs -0 clang-tidy-18 -p build --header-filter='.*/(src|app|tests)/.*' --warnings-as-errors='*'
